name: Delete dev releases

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to delete'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to delete'
        required: true

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  delete:
    runs-on: cx-public-ubuntu-x64
    steps:

      - name: Delete releases and tags
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          # Find every release whose tag name contains "-<input tag>"
          tags=$(gh release list --limit 1000 --json tagName \
            --jq ".[] | select(.tagName | contains(\"-${TAG}\")) | .tagName")

          if [ -z "$tags" ]; then
            echo "No releases matching pattern '-${TAG}' found."
            exit 0
          fi

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Deleting release and tag: $tag"
            # --cleanup-tag also deletes the underlying git tag
            gh release delete "$tag" --yes --cleanup-tag
          done <<< "$tags"